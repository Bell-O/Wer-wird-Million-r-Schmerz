<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Wer wird Millionär?</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="millionaire-theme page-game">
  <header class="show-header">
    <h1 class="show-title">Wer wird Millionär?</h1>
    <p class="show-subtitle">Casino Edition · Nur zu Bildungszwecken</p>
  </header>
  <div class="container game-container mt-2">
    <div id="statusArea" class="status-bar text-center mb-3" role="status" aria-live="polite"></div>
    
    <div class="row game-stage mb-3">
      <div class="col-12 col-lg-4" id="prizeBoardContainer">
        <div id="prizeBoard" aria-label="Gewinnleiter"></div>
      </div>
      <div class="col-12 col-lg-8" id="canvasContainer">
        <canvas id="gameCanvas" width="800" height="200" class="d-block mx-auto" aria-hidden="true"></canvas>
      </div>
    </div>
    
    <div id="helpSection" class="lifeline-bar text-center mb-3">
       <button id="btn5050" class="btn btn-lifeline" type="button">50:50</button>
       <button id="btnSwitch" class="btn btn-lifeline" type="button">Wechseln</button>
    </div>
    
    <div id="quizArea" class="quiz-panel mt-3">
      <div id="question" class="question-text text-center mb-3" role="heading" aria-level="2"></div>
      <div id="answers" class="row answers-grid"></div>
      <div id="confirmArea" class="confirm-area text-center mt-3" style="display: none;">
        <p id="confirmText" class="confirm-text mb-3"></p>
        <div class="confirm-actions">
          <button id="confirmAnswerBtn" class="btn btn-primary" type="button">Ja, endgültig</button>
          <button id="cancelAnswerBtn" class="btn btn-secondary" type="button">Abbrechen</button>
        </div>
      </div>
      <div class="action-bar text-center mt-3">
        <button id="quitGame" class="btn btn-warning btn-action" type="button">Aufhören und Gewinn mitnehmen</button>
      </div>
    </div>
    
    <div id="endGame" class="end-panel text-center mt-4" style="display: none;">
      <h3 id="resultMessage"></h3>
      <p>Dein Gewinn: € <span id="score"></span></p>
      <p>Spieler: <span id="displayPlayerName"></span></p>
      <div class="end-actions">
        <button id="newGame" class="btn btn-primary" type="button">Neues Spiel</button>
        <button id="closeGame" class="btn btn-secondary" type="button">Schließen</button>
      </div>
    </div>
  </div>

  <!-- Modal für den Spielernamen -->
  <div class="modal fade" id="playerModal" tabindex="-1" role="dialog" aria-labelledby="playerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
      <div class="modal-content">
         <div class="modal-header">
            <h5 class="modal-title" id="playerModalLabel">Gib deinen Namen ein, um zu starten</h5>
         </div>
         <div class="modal-body">
            <input type="text" id="modalPlayerName" class="form-control" placeholder="Dein Name...">
         </div>
         <div class="modal-footer">
           <button type="button" class="btn btn-primary" id="startGameBtn">Spiel starten</button>
         </div>
      </div>
    </div>
  </div>
  
  <footer class="site-footer site-footer-compact">
    <div class="credits">
      <p class="edu-disclaimer">Nur zu Bildungszwecken</p>
      <p class="credits-line">Angepasst von <a href="https://github.com/Bell-O" target="_blank" rel="noopener">Bell-O</a></p>
      <p class="credits-line credits-original">Original: <a href="https://github.com/bocaletto-luca" target="_blank" rel="noopener">Bocaletto Luca</a></p>
    </div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="controllers.js"></script>
  <script src="main.js"></script>
</body>
</html>
